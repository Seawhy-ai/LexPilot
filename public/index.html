<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f23" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="AI Chat · DeepSeek V4 Flash — 快速、智能的AI助手" />
  <title>AI Chat · DeepSeek V4 Flash</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>

  <!-- ===== header ===== -->
  <header class="topbar">
    <button class="btn-icon" id="btnSidebar" aria-label="会话列表">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
    <h1 class="topbar-title">DeepSeek Chat</h1>
    <button class="btn-icon" id="btnNewChat" aria-label="新对话">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>

  <!-- ===== sidebar overlay ===== -->
  <div class="overlay" id="overlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span>会话记录</span>
      <button class="btn-icon" id="btnCloseSidebar" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sidebar-list" id="conversationList"></div>
    <div class="sidebar-foot">
      <button class="btn-text" id="btnClearAll">🗑 清空全部会话</button>
    </div>
  </aside>

  <!-- ===== chat area ===== -->
  <main class="chat-area" id="chatArea">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>DeepSeek V4 Flash</h2>
        <p class="welcome-desc">快速、智能的 AI 助手，随时随地为你解答</p>
        <div class="capability-row">
          <span class="capability-chip highlight">知识问答</span>
          <span class="capability-chip">代码开发</span>
          <span class="capability-chip">论文辅导</span>
          <span class="capability-chip">创意写作</span>
          <span class="capability-chip">翻译润色</span>
        </div>
        <div class="section-label">试试这些</div>
        <div class="quick-prompts">
          <button class="quick-btn" data-prompt="解释一下量子计算的基本原理">⚛️ 量子计算原理</button>
          <button class="quick-btn" data-prompt="帮我写一段 Python 快速排序代码，带详细注释">🐍 Python 快排</button>
          <button class="quick-btn" data-prompt="推荐3本好看的科幻小说，并说明推荐理由">📚 科幻小说推荐</button>
          <button class="quick-btn" data-prompt="帮我写一篇关于人工智能伦理的论文大纲">📝 论文大纲</button>
        </div>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator" style="display:none">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </main>

  <!-- ===== input bar ===== -->
  <footer class="input-bar">
    <div class="input-row">
      <textarea
        id="userInput"
        class="input-field"
        placeholder="输入消息…"
        rows="1"
        autofocus
      ></textarea>
      <button class="btn-send" id="btnSend" aria-label="发送">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="input-hint">DeepSeek V4 Flash · 内容由 AI 生成，仅供参考</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
